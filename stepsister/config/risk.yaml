# ── Standard Engine Risk Parameters (Forex) ──────────────────────
max_drawdown_pct: 10.0
drawdown_reduce_pct: 5.0
cppi_floor_pct: 90.0
cppi_multiplier: 3.0
max_positions: 10
max_per_instrument: 1
max_correlated_positions: 3
correlation_threshold: 0.7
max_risk_per_trade_pct: 0.5
default_sl_atr_mult: 1.5
default_tp_atr_mult: 2.0
kelly_fraction: 0.5

# ── HFT Engine Risk Parameters (Forex) ────────────────────────────
# Micro-scalping configuration for forex: max frequency, tight SL/TP.
# Academic basis: Carapuco/Neves/Horta (2018), Sarani et al. (2024).
# Target: massive trade count, micro risk per trade, statistical edge.
hft:
  cycle_interval: 1              # 1s cycles — maximum frequency
  data_bars: 500                 # M1 bars to fetch (~8 hours)
  regime_interval_minutes: 15    # re-predict regime every 15 min
  refit_interval_hours: 4        # refit HMM every 4 hours

  risk:
    max_trades_per_day: 50000    # demo account — uncapped
    max_hft_positions: 30        # more concurrent for forex liquidity
    max_per_instrument_hft: 10   # forex spreads tighter — more per pair
    cooldown_seconds: 1          # 1s cooldown — rapid fire
    max_risk_per_trade_pct: 0.05 # 0.05% equity per trade — micro risk
    max_volume_per_trade: 0.05   # hard cap 0.05 lots
    default_sl_atr_mult: 0.3     # tight SL
    default_tp_atr_mult: 0.3     # tight TP — grab pips and exit
    max_daily_loss_pct: 3.0      # 3% daily loss cap
    spread_cost_buffer: 1.2      # TP must be 1.2x spread
    min_atr_pct: 0.2             # lower ATR floor for forex (smaller % moves)
    min_signal_strength: 0.0     # take all signals

    # Margin backoff — less aggressive for forex (high liquidity)
    margin_backoff_base: 5        # 5s initial backoff (was hardcoded 30s)
    margin_backoff_max: 30        # 30s max backoff (was hardcoded 300s)

    # Position prefix — only count stepsister positions, not Klaus
    position_prefix: "S|"

    # Growth mode — auto-applied for accounts under $5000
    growth_mode:
      equity_threshold: 5000
      risk_per_trade_pct: 1.0
      min_signal_strength: 0.03
      max_volume_per_trade: 0.10
      max_hft_positions: 15
      max_per_instrument: 5
      cooldown_seconds: 1
      default_sl_atr_mult: 0.25
      default_tp_atr_mult: 0.30
      max_daily_loss_pct: 5.0

    # Trailing stop — lock in profits
    trailing_stop:
      enabled: true
      activation_pct: 40
      trail_pct: 50
      breakeven_pct: 25
      max_hold_seconds: 120
