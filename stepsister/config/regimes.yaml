hmm:
  n_states: 3
  features:
    - returns
    - rolling_volatility
  covariance_type: full
  n_iter: 100
  refit_interval: weekly
  predict_timeframe: H4

mapping:
  EURUSD:
    TRENDING:
      - fx_sma_crossover
      - fx_momentum
      - fx_lstm_signal
      - fx_xgboost_signal
    MEAN_REVERTING:
      - fx_bollinger
      - fx_zscore
      - carry_trade
      - fx_xgboost_signal
    VOLATILE: []

  GBPUSD:
    TRENDING:
      - fx_sma_crossover
