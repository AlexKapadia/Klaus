# ── HFT Algorithm -> Instrument x Regime Mapping ──────────────────
# Used by the FX HFT engine on M1 bars.
hft_mapping:
  EURUSD:
    TRENDING: &all_fx_hft
      - fx_tick_scalper
      - fx_order_flow
      - fx_micro_reversion
      - fx_momentum_hft
      - fx_vol_breakout
      - fx_cross_pair_lead_lag
      - fx_spread_scalper
      - fx_dqn_scalper
      - fx_xgboost_hft
    MEAN_REVERTING: *all_fx_hft
    VOLATILE: *all_fx_hft

  GBPUSD:
    TRENDING: *all_fx_hft
    MEAN_REVERTING: *all_fx_hft
    VOLATILE: *all_fx_hft

  USDJPY:
    TRENDING: *all_fx_hft
